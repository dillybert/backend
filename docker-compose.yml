services:

  # ─────────────────────────────────────────
  # PostgreSQL
  # ─────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB:       ${POSTGRES_DB:-lift}
      POSTGRES_USER:     ${POSTGRES_USER:-lift}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-lift}
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-lift} -d ${POSTGRES_DB:-lift}"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 10s

  # ─────────────────────────────────────────
  # Redis
  # ─────────────────────────────────────────
  redis:
    image: redis:7-alpine
    restart: unless-stopped
    command: >
      redis-server
      --requirepass ${REDIS_PASSWORD:-lift}
      --maxmemory 256mb
      --maxmemory-policy allkeys-lru
      --appendonly yes
    ports:
      - "6379:6379"
    volumes:
      - redisdata:/data
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD:-lift}", "ping"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 5s

  # ─────────────────────────────────────────
  # Go App
  # ─────────────────────────────────────────
  app:
    build:
      context: .
      dockerfile: Dockerfile
      target: development
    restart: unless-stopped
    env_file: .env
    ports:
      - "8080:8080"
    volumes:
      # Hot reload: монтируем исходники
      - .:/app
      # Кэш Go модулей — не перекачиваем каждый раз
      - gomodcache:/go/pkg/mod
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:8080/health"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s

  # ─────────────────────────────────────────
  # Adminer — веб UI для PostgreSQL
  # Открыть: http://localhost:8081
  # ─────────────────────────────────────────
  adminer:
    image: adminer:latest
    restart: unless-stopped
    ports:
      - "8081:8080"
    environment:
      ADMINER_DEFAULT_SERVER: postgres
      ADMINER_DESIGN: pepa-linha-dark
    depends_on:
      postgres:
        condition: service_healthy
    profiles:
      - tools

  # ─────────────────────────────────────────
  # Redis Commander — веб UI для Redis
  # Открыть: http://localhost:8082
  # ─────────────────────────────────────────
  redis-commander:
    image: rediscommander/redis-commander:latest
    restart: unless-stopped
    ports:
      - "8082:8081"
    environment:
      REDIS_HOSTS:    local:redis:6379:0:${REDIS_PASSWORD:-lift}
      HTTP_USER:      ${REDIS_UI_USER:-admin}
      HTTP_PASSWORD:  ${REDIS_UI_PASSWORD:-admin}
    depends_on:
      redis:
        condition: service_healthy
    profiles:
      - tools

  # ─────────────────────────────────────────
  # Mailpit — локальный SMTP + веб UI для email
  # SMTP: localhost:1025
  # UI:   http://localhost:8025
  # Понадобится когда добавим email уведомления
  # ─────────────────────────────────────────
  mailpit:
    image: axllent/mailpit:latest
    restart: unless-stopped
    ports:
      - "1025:1025"
      - "8025:8025"
    profiles:
      - tools

volumes:
  pgdata:
  redisdata:
  gomodcache:
